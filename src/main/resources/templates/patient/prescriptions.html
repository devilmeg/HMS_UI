<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Prescriptions</title>

    <link rel="stylesheet" th:href="@{/css/monitor.css}">

    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .back-btn {
            background: rgba(56,189,248,0.15);
            border: 1px solid rgba(56,189,248,0.4);
            color: #38bdf8;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #38bdf8;
            color: #020617;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
        }

        .sub {
            color: #cbd5f5;
            font-size: 15px;
            margin-bottom: 20px;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 16px 22px;
            border-radius: 14px;
            border: 1px solid rgba(56,189,248,0.3);
        }

        .stat-title {
            font-size: 12px;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: #38bdf8;
        }

        /* TABLE + LEGEND */
        .table-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .card {
            flex: 1;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 18px;
            padding: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 14px;
            background: #f1f5f9;
            color: #020617;
        }

        td {
            padding: 14px;
            color: #cbd5f5;
        }

        tr:hover {
            background: rgba(56,189,248,0.08);
        }

        .center {
            text-align: center;
        }

        /* STATUS */
        .status {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
        }

        .active {
            background: #22c55e;
            color: #022c22;
        }

        .completed {
            background: #94a3b8;
            color: #0f172a;
        }

        /* LEGEND */
        .legend-vertical {
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .legend-title {
            font-size: 11px;
            color: #94a3b8;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .legend-item .title {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }

        .legend-item .desc {
            font-size: 10px;
            color: #94a3b8;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.active { background: #22c55e; }
        .dot.completed { background: #94a3b8; }

        .empty {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="container">

    <a th:href="@{/ui/patient/dashboard(id=${patientId})}" class="back-btn">Back to Dashboard</a>

    <h1>Patient Prescriptions</h1>
    <div class="sub">Patient ID: <span th:text="${patientId}"></span></div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-title">Total Prescriptions</div>
            <div class="stat-value" th:text="${#lists.size(prescriptions)}"></div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Latest</div>
            <div class="stat-value"
                 th:text="${#lists.isEmpty(prescriptions) ? '-' : #dates.format(prescriptions[0].appointmentDate, 'dd MMM yyyy')}">
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(prescriptions)}" class="empty">
        No prescriptions found.
    </div>

    <!-- TABLE + LEGEND -->
    <div class="table-wrapper" th:if="${!#lists.isEmpty(prescriptions)}">

        <div class="card">
            <table>
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Doctor</th>
                    <th>Medicine</th>
                    <th class="center">Dose</th>
                    <th class="center">Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${prescriptions}">
                    <td th:attr="data-date=${p.appointmentDate.time}"
                        th:text="${#dates.format(p.appointmentDate, 'dd MMM yyyy')}"></td>

                    <td th:text="${p.physicianName}"></td>
                    <td th:text="${p.medicineName}"></td>
                    <td class="center" th:text="${p.dose}"></td>

                    <td class="center">
                        <span class="status"
                              th:text="${p.status}"
                              th:classappend="${p.status == 'Active'} ? ' active' : ' completed'">
                        </span>
                        <div class="time-info"></div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- LEGEND -->
        <div class="legend-vertical">
            <div class="legend-title">Status Guide</div>

            <div class="legend-item">
                <span class="dot active"></span>
                <div>
                    <div class="title">Active</div>
                    <div class="desc">Ongoing medication</div>
                </div>
            </div>

            <div class="legend-item">
                <span class="dot completed"></span>
                <div>
                    <div class="title">Completed</div>
                    <div class="desc">Course finished</div>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
    document.querySelectorAll("tbody tr").forEach(row => {
        const dateCell = row.querySelector("td[data-date]");
        const status = row.querySelector(".status").innerText.trim();
        const info = row.querySelector(".time-info");

        const timestamp = parseInt(dateCell.getAttribute("data-date"));
        const prescriptionDate = new Date(timestamp);

        const now = new Date();
        const diffDays = Math.floor((now - prescriptionDate) / (1000 * 60 * 60 * 24));

        if (status === "Active") {
            const daysLeft = 7 - diffDays;
            info.innerText = daysLeft > 0
                ? `${daysLeft} day(s) left`
                : "Last day";
        } else {
            info.innerText = `${diffDays} day(s) ago`;
        }
    });
</script>

</body>
</html>
