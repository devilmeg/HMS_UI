<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Physician Gateway | VitalSync</title>
    <link rel="stylesheet" th:href="@{/css/monitor.css}">
    <style>
        :root { --primary-blue: #3B82F6; --navy-dark: #0F172A; }
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?q=80&w=2053');
            background-size: cover; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: -1; }

        .login-card {
            background: rgba(255, 255, 255, 0.95); padding: 50px; border-radius: 24px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 100%; max-width: 400px;
        }
        .form-control { width: 80%; padding: 15px; border-radius: 12px; border: 2px solid #E2E8F0; font-size: 1.2rem; text-align: center; margin-bottom: 20px; outline: none; }
        .form-control:focus { border-color: var(--primary-blue); }
        .btn-enter { background: var(--primary-blue); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 80%; }
        .btn-enter:hover { transform: scale(1.02); background: #2563EB; }
    </style>
</head>
<body>
<div class="login-card">
    <h2 style="color: #0F172A; margin-bottom: 10px;">VitalSync HMS</h2>
    <p style="color: #64748B; margin-bottom: 30px;">Authorized Physician Access Only</p>

    <form th:action="@{/physician-login}" method="post">
        <input type="number" name="physicianId" class="form-control" placeholder="Enter Employee ID" required autofocus>
        <br>
        <button type="submit" class="btn-enter">Access Dashboard</button>
    </form>
</div>
</body>
</html>
