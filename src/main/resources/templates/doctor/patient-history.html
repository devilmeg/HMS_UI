<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient History | Astral Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --aura-blue: #3B82F6;
            --aura-purple: #9333ea;
            --aura-glow: rgba(59, 130, 246, 0.6);
            --space-black: #02040a;
            --glass-aura: rgba(255, 255, 255, 0.03);
            --spark: #ffffff;

        }

        body {
            margin: 0; padding: 40px;
            font-family: 'Space Grotesk', sans-serif;
            color: #e2e8f0;
            background-color: var(--space-black);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- ASTRAL BACKGROUND --- */
        .astral-void {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1), transparent 40%);
            z-index: -2;
        }

        /* --- MONITOR HEADER --- */
        .monitor-viewport {
            width: 100%; max-width: 1200px; height: 200px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid rgba(59, 130, 246, 0.3);
            position: relative; overflow: hidden;
            display: flex; align-items: center; padding: 0 50px; margin-bottom: 40px;
        }

        .dna-vibrant-bg {
            position: absolute; width: 100%; height: 100%; left: 0; top: 0;
            display: flex; justify-content: space-around; align-items: center;
            opacity: 0.3; z-index: 1;
        }
        .dna-strand {
            width: 3px; height: 120px;
            background: linear-gradient(to bottom, transparent, var(--aura-blue), transparent);
            animation: dna-spin 3s ease-in-out infinite;
        }
        @keyframes dna-spin { 0%, 100% { transform: rotateY(0deg) scaleY(1); } 50% { transform: rotateY(180deg) scaleY(0.7); } }

        /* --- ACTION HUB --- */
        .action-hub { width: 100%; max-width: 1200px; display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-outline {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px 25px; border-radius: 12px;
            text-decoration: none; font-weight: 600; transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-outline:hover { background: var(--aura-blue); border-color: var(--aura-blue); box-shadow: 0 0 20px var(--aura-glow); }

        /* --- THE SPARKLER DATA CARD --- */
        .data-card {
            width: 100%; max-width: 1200px;
            background: var(--glass-aura); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 40px;
            position: relative; overflow: hidden;
        }

        /* Sparkler Border Effect */
        .data-card::before {
            content: ''; position: absolute; inset: 0; padding: 2px;
            background: linear-gradient(to right, transparent, var(--aura-blue), #fff, var(--aura-purple), transparent);
            background-size: 200% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; border-radius: 24px;
            animation: spark-travel 3s linear infinite;
        }
        @keyframes spark-travel { from { background-position: 200% 0; } to { background-position: 0% 0; } }

        /* --- TABLE STYLING --- */
        table { width: 100%; border-collapse: collapse; position: relative; z-index: 5; }
        th { text-align: left; padding: 20px; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e2e8f0; font-size: 0.95rem; }

        .aura-text { color: var(--aura-blue); font-family: 'JetBrains Mono'; font-weight: bold; }

        /* Badges */
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-consult { background: rgba(59, 130, 246, 0.1); color: var(--aura-blue); border: 1px solid var(--aura-blue); }
        .badge-proc { background: rgba(147, 51, 234, 0.1); color: #A855F7; border: 1px solid #A855F7; }

    </style>
</head>
<body>

<div class="astral-void"></div>

<div class="monitor-viewport">
    <div class="dna-vibrant-bg">
        <div class="dna-strand" th:each="i : ${#numbers.sequence(1, 15)}"
             th:style="'animation-delay: ' + (${i} * 0.2) + 's'"></div>
    </div>
    <div class="monitor-content" style="position: relative; z-index: 10;">
        <h1 th:text="'Patient History | SSN: ' + ${ssn}">Patient History</h1>
        <div style="font-family: 'JetBrains Mono'; color: var(--aura-blue); margin-top:10px;">
            > DATA_STREAM_DECRYPTED // ACCESS_GRANTED
        </div>
    </div>
</div>

<div class="action-hub">
    <a th:href="@{/ui/physician/{id}/dashboard(id=${doctorId ?: 3})}" class="btn-outline">⬅ Back to Command Suite</a>
</div>

<div class="data-card">
    <h3 class="aura-text" th:text="${currentViewTitle}">CHRONOLOGY_VIEW</h3>
    <table>
        <thead>
        <tr>
            <th>Stardate</th>
            <th>Classification</th>
            <th>Medical Description</th>
            <th>Physician</th>
            <th>Room / Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${history}">
            <td th:text="${entry.date}" class="aura-text"></td>
            <td>
                    <span th:class="${entry.eventType == 'PROCEDURE' ? 'badge badge-proc' : 'badge badge-consult'}"
                          th:text="${entry.eventType}">TYPE</span>
            </td>
            <td th:text="${entry.description}">Clinical Details</td>
            <td th:text="${entry.physician}">Physician</td>
            <td th:text="${entry.results}">Outcome</td>
        </tr>
        <tr th:if="${#lists.isEmpty(history)}">
            <td colspan="5" style="text-align: center; padding: 50px; color: #64748B;">
                NO_HISTORICAL_RECORDS_FOUND_IN_SYSTEM
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
