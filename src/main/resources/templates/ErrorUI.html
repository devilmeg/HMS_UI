<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>System Alert | VitalSync</title>
    <link rel="stylesheet" th:href="@{/css/monitor.css}">
    <style>
        :root { --alert-red: #EF4444; --navy-dark: #0F172A; }
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--navy-dark);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: white;
        }
        .error-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px; padding: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .status-code { font-size: 5rem; font-weight: 800; color: rgba(255,255,255,0.1); margin-bottom: -40px; }
        h2 { color: var(--alert-red); font-size: 2rem; margin-bottom: 15px; position: relative; }
        p { color: #94A3B8; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-retry {
            background: #3B82F6; color: white; text-decoration: none;
            padding: 12px 35px; border-radius: 12px; font-weight: bold;
            transition: 0.3s; display: inline-block;
        }
        .btn-retry:hover { background: #2563EB; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="error-container">
    <div class="status-code" th:text="${errorStatus}">500</div>
    <h2 th:text="${errorTitle}">System Error</h2>
    <p th:text="${errorMessage}">The server was unable to interpret the request.</p>

    <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <a th:href="@{/}" class="btn-retry">Return to Command Center</a>
    </div>
</div>
</body>
</html>
